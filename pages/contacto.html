<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="titulo">GymHub - Contacto</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-inner">
            <h1><a href="../index.html">GYM<span class="text-azul">HUB</span></a></h1>
            <nav>
                <ul>
                    <li>
                        <a href="../index.html">HOME</a>
                    </li>
                    
                    <li>
                        <a href="contacto.html">CONTACTO</a>
                    </li>

                    <li>
                        <a href="carrito.html" class = "carrito-icono">🛒<span id="contador-carrito">0</span></a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <section id="contacto">
            <h2>Contacto</h2>
            <p>Completá el formulario y te respondemos a la brevedad.</p>

            <form action="https://formspree.io/f/mgodblwb" method="POST">

                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="tuemail@gmail.com" required>

                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="8" placeholder="Escribí tu consulta acá..." required></textarea>

                <button type="submit">Enviar</button>

            </form>

            <div class="info-contacto">
                <p><img src="../img/ic_ubicacion.png" alt="Ubicación"> Av. Corrientes 1234, CABA</p>
                <p><img src="../img/ic_telefono.png" alt="Teléfono"> (+54) 11-2233-4455</p>
                <p><img src="../img/ic_gmail.png" alt="Email"> gymhuboficial@gmail.com</p>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; Sitio realizado por Damian Luna para Talento Tech. Todos los derechos reservados.</p>
        <ul>
            <li>
                <a href="../index.html">HOME</a>
            </li>
            
            <li>
                <a href="contacto.html">CONTACTO</a>
            </li>
        </ul>
    </footer>
    <script src="../js/contacto.js" type="module"></script>

</body>
</html>
